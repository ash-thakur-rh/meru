<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 48 48" fill="none">
  <defs>
    <filter id="glow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Mountain face (subtle fill so shape reads as solid) -->
  <path d="M24 9 L8 42 L40 42 Z" fill="#7c3aed" fill-opacity="0.1"/>

  <!-- Outer mountain ridge lines -->
  <line x1="24" y1="9"  x2="8"  y2="42" stroke="#7c3aed" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="24" y1="9"  x2="40" y2="42" stroke="#7c3aed" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="8"  y1="42" x2="40" y2="42" stroke="#6d28d9" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Hub-to-shoulder connections -->
  <line x1="24" y1="9" x2="16" y2="27" stroke="#7c3aed" stroke-width="1.2" stroke-opacity="0.85"/>
  <line x1="24" y1="9" x2="32" y2="27" stroke="#7c3aed" stroke-width="1.2" stroke-opacity="0.85"/>

  <!-- Shoulder-to-shoulder -->
  <line x1="16" y1="27" x2="32" y2="27" stroke="#6d28d9" stroke-width="1" stroke-opacity="0.6"/>

  <!-- Shoulder-to-base -->
  <line x1="16" y1="27" x2="8"  y2="42" stroke="#6d28d9" stroke-width="1" stroke-opacity="0.6"/>
  <line x1="16" y1="27" x2="24" y2="42" stroke="#6d28d9" stroke-width="1" stroke-opacity="0.6"/>
  <line x1="32" y1="27" x2="24" y2="42" stroke="#6d28d9" stroke-width="1" stroke-opacity="0.6"/>
  <line x1="32" y1="27" x2="40" y2="42" stroke="#6d28d9" stroke-width="1" stroke-opacity="0.6"/>

  <!-- Base nodes (agents) -->
  <circle cx="8"  cy="42" r="1.8" fill="#6d28d9"/>
  <circle cx="24" cy="42" r="1.8" fill="#6d28d9"/>
  <circle cx="40" cy="42" r="1.8" fill="#6d28d9"/>

  <!-- Shoulder nodes (sub-orchestrators) -->
  <circle cx="16" cy="27" r="2.2" fill="#7c3aed"/>
  <circle cx="32" cy="27" r="2.2" fill="#7c3aed"/>

  <!-- Peak — central orchestrator, glowing -->
  <circle cx="24" cy="9" r="4.5" fill="#a855f7" fill-opacity="0.2" filter="url(#glow)"/>
  <circle cx="24" cy="9" r="3.2" fill="#9333ea"/>
  <circle cx="24" cy="9" r="1.7" fill="#c084fc"/>
</svg>
