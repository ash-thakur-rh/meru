version: 2

project_name: meru

# Build web UI before compiling Go binaries so the embed is populated.
before:
  hooks:
    - go mod tidy
    - npm --prefix web ci
    - npm --prefix web run build
    - bash -c "rm -rf internal/ui/dist && cp -r web/dist internal/ui/dist"

builds:
  - id: meru
    binary: meru
    main: ./cmd/meru
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      # No arm64 Windows builds (no runners; uncommon target)
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.date={{.Date}}

  - id: meru-node
    binary: meru-node
    main: ./cmd/meru-node
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.date={{.Date}}

archives:
  - id: meru
    builds: [meru, meru-node]
    name_template: >-
      {{ .ProjectName }}_
      {{- .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "arm64" }}arm64
      {{- else }}{{ .Arch }}{{ end }}
    format: tar.gz
    format_overrides:
      - goos: windows
        format: zip
    files:
      - README.md
      - LICENSE

checksum:
  name_template: checksums.txt
  algorithm: sha256

changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "^ci:"
      - "Merge pull request"
      - "Merge branch"
  groups:
    - title: "New Features"
      regexp: "^feat"
      order: 0
    - title: "Bug Fixes"
      regexp: "^fix"
      order: 1
    - title: "Other Changes"
      order: 999

release:
  github:
    owner: ash-thakur-rh
    name: meru
  name_template: "v{{ .Version }}"
  draft: false
  prerelease: auto
  footer: |
    ## Installation

    Download the archive for your platform from the assets above, extract it, and place the binaries on your `$PATH`.

    ### macOS / Linux

    ```bash
    tar -xzf meru_<OS>_<ARCH>.tar.gz
    sudo mv meru meru-node /usr/local/bin/
    ```

    ### Windows

    Extract the zip and add the directory to your `%PATH%`.

    ---
    **Full documentation:** https://ash-thakur-rh.github.io/meru
