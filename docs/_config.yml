title: Meru
description: Orchestrate AI coding agents across your local machine and remote servers.
baseurl: "/meru"
url: "https://ash-thakur-rh.github.io"

remote_theme: just-the-docs/just-the-docs@v0.12.0

# Site settings
color_scheme: light
search_enabled: true
search:
  heading_level: 3
  previews: 3

# Footer links
footer_content: >
  Copyright &copy; 2026 ash-thakur-rh.
  Distributed under the <a href="https://www.apache.org/licenses/LICENSE-2.0">Apache 2.0 License</a>.

# GitHub repo link in header
gh_button_links:
  - label: View on GitHub
    url: https://github.com/ash-thakur-rh/meru
    icon: github

aux_links:
  "View on GitHub":
    - "https://github.com/ash-thakur-rh/meru"
aux_links_new_tab: true

# Callout configuration
callouts:
  note:
    title: Note
    color: blue
  tip:
    title: Tip
    color: green
  warning:
    title: Warning
    color: yellow
  important:
    title: Important
    color: red

plugins:
  - jekyll-remote-theme
  - jekyll-seo-tag

# Exclude from site
exclude:
  - "*.gemspec"
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
